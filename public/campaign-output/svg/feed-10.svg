<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" fill="none">
<title>Feed 10 · Screen Time Report (Observe)</title>
<defs>
  <filter id="blur-heavy" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="60"/>
  </filter>
  <filter id="blur-medium" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="40"/>
  </filter>
  <filter id="blur-soft" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="20"/>
  </filter>
  <filter id="grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix values="0 0 0 0 0.95  0 0 0 0 0.93  0 0 0 0 0.85  0 0 0 0.4 0"/>
    <feComposite operator="in" in2="SourceGraphic"/>
  </filter>
  <linearGradient id="grad-warm" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e36c49"/>
    <stop offset="55%" stop-color="#e1b049"/>
    <stop offset="100%" stop-color="#e492a5"/>
  </linearGradient>
  <linearGradient id="grad-terra-mustard" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e36c49"/>
    <stop offset="100%" stop-color="#e1b049"/>
  </linearGradient>
  <linearGradient id="grad-pink-blue" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e492a5"/>
    <stop offset="100%" stop-color="#6b8bc7"/>
  </linearGradient>
  <linearGradient id="grad-rainbow-band" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e36c49" stop-opacity="0"/>
    <stop offset="15%" stop-color="#e36c49"/>
    <stop offset="40%" stop-color="#e1b049"/>
    <stop offset="65%" stop-color="#aac8b7"/>
    <stop offset="88%" stop-color="#6b8bc7"/>
    <stop offset="100%" stop-color="#6b8bc7" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="rg-terra" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e36c49" stop-opacity="1"/>
    <stop offset="55%" stop-color="#c24c2b" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#e36c49" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-mustard" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e1b049" stop-opacity="1"/>
    <stop offset="55%" stop-color="#ba892c" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#e1b049" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-sage" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#aac8b7" stop-opacity="1"/>
    <stop offset="55%" stop-color="#5a7770" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#aac8b7" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-blue" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#6b8bc7" stop-opacity="1"/>
    <stop offset="55%" stop-color="#3d5389" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#6b8bc7" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-pink" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e492a5" stop-opacity="1"/>
    <stop offset="55%" stop-color="#a4536a" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#e492a5" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-iris" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#6b8bc7"/>
    <stop offset="25%" stop-color="#3d5389"/>
    <stop offset="60%" stop-color="#e492a5"/>
    <stop offset="88%" stop-color="#e36c49"/>
    <stop offset="100%" stop-color="#0A0908" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-iris-mask" cx="50%" cy="50%" r="50%">
    <stop offset="70%" stop-color="#0A0908" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0A0908" stop-opacity="1"/>
  </radialGradient>
  <radialGradient id="rg-vignette" cx="50%" cy="42%" r="70%">
    <stop offset="35%" stop-color="#0A0908" stop-opacity="0"/>
    <stop offset="78%" stop-color="#0A0908" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#0A0908" stop-opacity="0.88"/>
  </radialGradient>
</defs>

<!-- ============ CANVAS ============ -->
<rect id="canvas" width="1080" height="1350" fill="#0A0908"/>

<defs>
  <linearGradient id="grad-ig" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f09433"/>
    <stop offset="25%" stop-color="#e6683c"/>
    <stop offset="50%" stop-color="#dc2743"/>
    <stop offset="75%" stop-color="#cc2366"/>
    <stop offset="100%" stop-color="#bc1888"/>
  </linearGradient>
</defs>

<!-- ============ BACKGROUND BLURS ============ -->
<g id="background-blurs">
  <ellipse cx="1150" cy="120" rx="330" ry="330" fill="url(#rg-blue)" filter="url(#blur-heavy)" opacity="0.55"/>
  <ellipse cx="-40" cy="1210" rx="380" ry="380" fill="url(#rg-pink)" filter="url(#blur-heavy)" opacity="0.5"/>
  <ellipse cx="1100" cy="580" rx="180" ry="180" fill="url(#rg-mustard)" filter="url(#blur-medium)" opacity="0.4"/>
</g>


<!-- ============ FRAME ============ -->
<rect id="frame-inset" x="32" y="32" width="1016" height="1286" rx="8" ry="8"
      fill="none" stroke="rgba(237,230,216,0.06)" stroke-width="1"/>


<!-- ============ SCREEN TIME CARD ============ -->
<g id="card">
  <rect x="80" y="180" width="920" height="640" rx="26" ry="26"
        fill="rgba(20,18,16,0.85)" stroke="rgba(237,230,216,0.09)" stroke-width="1"/>
  <text x="128" y="248" fill="#d6cdb9"
        font-family="'IBM Plex Mono', monospace"
        font-weight="500" font-size="22" letter-spacing="3.3"
        style="text-transform:uppercase">Screen Time</text>
  <text x="948" y="248" text-anchor="end" fill="#8a857a"
        font-family="'IBM Plex Mono', monospace"
        font-weight="500" font-size="18" letter-spacing="1.8">Minggu ini</text>
  <line x1="128" y1="280" x2="948" y2="280" stroke="rgba(237,230,216,0.08)" stroke-width="1"/>


  <g id="row-instagram">
    
    <svg x="128" y="320" width="62" height="62" viewBox="0 0 48 48">
      <rect x="0" y="0" width="48" height="48" rx="14" fill="url(#grad-ig)"/>
      <rect x="10" y="10" width="28" height="28" rx="8" fill="none" stroke="#ffffff" stroke-width="3"/>
      <circle cx="24" cy="24" r="7.5" fill="none" stroke="#ffffff" stroke-width="3"/>
      <circle cx="34" cy="14" r="2" fill="#ffffff"/>
    </svg>
    
    <text x="210" y="355" fill="#EDE6D8"
          font-family="Jost, 'Helvetica Neue', sans-serif"
          font-weight="700" font-size="26">Instagram</text>
    <text x="210" y="382" fill="#8a857a"
          font-family="Jost, 'Helvetica Neue', sans-serif"
          font-weight="500" font-size="14" letter-spacing="3.4"
          style="text-transform:uppercase">Social</text>
    <text x="948" y="368" text-anchor="end" fill="#EDE6D8"
          font-family="'IBM Plex Mono', monospace"
          font-weight="600" font-size="34">2h 31m</text>
    <rect x="812" y="382" width="136" height="3"
          fill="#e36c49" rx="1.5" ry="1.5"/>
  </g>

  <line x1="128" y1="405" x2="948" y2="405" stroke="rgba(237,230,216,0.06)" stroke-width="1"/>


  <g id="row-tiktok">
    
    <svg x="128" y="440" width="62" height="62" viewBox="-4 -4 56 56">
      <rect x="0" y="0" width="48" height="48" rx="14" fill="#000000" stroke="rgba(237,230,216,0.16)" stroke-width="1"/>
      <path fill="#25F4EE" transform="translate(-3.5 2.5)" d="M31.5 6c.5 4.1 3.7 7.3 7.8 7.8v5.5c-2.6 0-5.1-.8-7.2-2.2v13.1c0 6.3-5.1 11.4-11.4 11.4S9.3 36.5 9.3 30.2s5.1-11.4 11.4-11.4c.6 0 1.1 0 1.7.1v5.7c-.5-.1-1.1-.2-1.7-.2-3.2 0-5.8 2.6-5.8 5.8s2.6 5.8 5.8 5.8 5.9-2.5 5.9-5.7L26.6 6h4.9z"/>
      <path fill="#FE2C55" transform="translate(3.5 -2.5)" d="M31.5 6c.5 4.1 3.7 7.3 7.8 7.8v5.5c-2.6 0-5.1-.8-7.2-2.2v13.1c0 6.3-5.1 11.4-11.4 11.4S9.3 36.5 9.3 30.2s5.1-11.4 11.4-11.4c.6 0 1.1 0 1.7.1v5.7c-.5-.1-1.1-.2-1.7-.2-3.2 0-5.8 2.6-5.8 5.8s2.6 5.8 5.8 5.8 5.9-2.5 5.9-5.7L26.6 6h4.9z"/>
      <path fill="#ffffff" d="M31.5 6c.5 4.1 3.7 7.3 7.8 7.8v5.5c-2.6 0-5.1-.8-7.2-2.2v13.1c0 6.3-5.1 11.4-11.4 11.4S9.3 36.5 9.3 30.2s5.1-11.4 11.4-11.4c.6 0 1.1 0 1.7.1v5.7c-.5-.1-1.1-.2-1.7-.2-3.2 0-5.8 2.6-5.8 5.8s2.6 5.8 5.8 5.8 5.9-2.5 5.9-5.7L26.6 6h4.9z"/>
    </svg>
    
    <text x="210" y="475" fill="#EDE6D8"
          font-family="Jost, 'Helvetica Neue', sans-serif"
          font-weight="700" font-size="26">TikTok</text>
    <text x="210" y="502" fill="#8a857a"
          font-family="Jost, 'Helvetica Neue', sans-serif"
          font-weight="500" font-size="14" letter-spacing="3.4"
          style="text-transform:uppercase">Social</text>
    <text x="948" y="488" text-anchor="end" fill="#EDE6D8"
          font-family="'IBM Plex Mono', monospace"
          font-weight="600" font-size="34">1h 58m</text>
    <rect x="840" y="502" width="108" height="3"
          fill="#EDE6D8" rx="1.5" ry="1.5"/>
  </g>

  <line x1="128" y1="525" x2="948" y2="525" stroke="rgba(237,230,216,0.06)" stroke-width="1"/>


  <g id="row-spotify">
    
    <svg x="128" y="560" width="62" height="62" viewBox="0 0 48 48">
      <rect x="0" y="0" width="48" height="48" rx="14" fill="#1DB954"/>
      <path fill="#ffffff" d="M35.4 21.9c-6.2-3.7-16.5-4-22.4-2.2-.95.29-1.95-.25-2.24-1.2-.29-.95.25-1.95 1.2-2.24 6.8-2.06 18.2-1.7 25.36 2.55.86.51 1.15 1.62.64 2.48-.51.87-1.63 1.16-2.5.65zm-.2 5.4c-.44.72-1.38 1.0-2.1.55-5.2-3.19-13.1-4.11-19.3-2.24-.82.24-1.67-.24-1.9-1.06-.24-.82.24-1.67 1.06-1.9 7.1-2.14 15.8-1.13 21.7 2.5.72.44.98 1.38.54 2.15zm-2.4 5.2c-.35.58-1.1.76-1.68.4-4.55-2.78-10.28-3.4-17.05-1.86-.66.14-1.32-.28-1.46-.94-.14-.66.28-1.32.94-1.46 7.4-1.7 13.7-.99 18.85 2.16.57.35.75 1.11.4 1.7z"/>
    </svg>
    
    <text x="210" y="595" fill="#EDE6D8"
          font-family="Jost, 'Helvetica Neue', sans-serif"
          font-weight="700" font-size="26">Spotify</text>
    <text x="210" y="622" fill="#8a857a"
          font-family="Jost, 'Helvetica Neue', sans-serif"
          font-weight="500" font-size="14" letter-spacing="3.4"
          style="text-transform:uppercase">Audio</text>
    <text x="948" y="608" text-anchor="end" fill="#EDE6D8"
          font-family="'IBM Plex Mono', monospace"
          font-weight="600" font-size="34">2h 04m</text>
    <rect x="833" y="622" width="115" height="3"
          fill="#1DB954" rx="1.5" ry="1.5"/>
  </g>

  <line x1="128" y1="645" x2="948" y2="645" stroke="rgba(237,230,216,0.06)" stroke-width="1"/>

  <!-- Cek diri row -->
  <g id="row-cek">
    <rect x="128" y="680" width="62" height="62" rx="14" ry="14"
          fill="rgba(237,230,216,0.05)" stroke="rgba(237,230,216,0.35)" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="159" y="720" text-anchor="middle" fill="#d6cdb9"
          font-family="Jost, 'Helvetica Neue', sans-serif"
          font-weight="700" font-size="26">?</text>
    <text x="210" y="715" fill="#d6cdb9"
          font-family="Jost, 'Helvetica Neue', sans-serif"
          font-weight="700" font-size="26">Cek Diri Sendiri</text>
    <text x="210" y="742" fill="#8a857a"
          font-family="Jost, 'Helvetica Neue', sans-serif"
          font-weight="500" font-size="14" letter-spacing="3.4"
          style="text-transform:uppercase">Refleksi</text>
    <text x="948" y="728" text-anchor="end" fill="#8a857a"
          font-family="'IBM Plex Mono', monospace"
          font-style="italic" font-weight="500" font-size="34">?</text>
  </g>
</g>

<!-- ============ HEADLINE ============ -->
<g id="typography-headline" font-family="Jost, 'Helvetica Neue', sans-serif"
   font-weight="800" letter-spacing="-1.4" font-size="68">
  <text x="80" y="950" fill="#EDE6D8" style="text-transform:uppercase">Laporan</text>
  <text x="80" y="1018" fill="#e492a5" font-style="italic" style="text-transform:uppercase">minggu ini.</text>
</g>

<!-- ============ CAPTION ============ -->
<g id="caption" font-family="Jost, 'Helvetica Neue', sans-serif"
   font-style="italic" font-weight="300" font-size="24" fill="#d6cdb9">
  <text x="80" y="1120">Ada banyak hal yang bisa dihitung.</text>
  <text x="80" y="1155">Kalau tentang dirimu sendiri?</text>
</g>


<!-- ============ GRAIN ============ -->
<rect id="grain" width="1080" height="1350" fill="#EDE6D8" opacity="0.11" filter="url(#grain)"/>


<!-- ============ (corners intentionally empty) ============ -->

</svg>
