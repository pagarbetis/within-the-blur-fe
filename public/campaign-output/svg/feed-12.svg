<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" fill="none">
<title>Feed 12 · Loading (Pause)</title>
<defs>
  <filter id="blur-heavy" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="60"/>
  </filter>
  <filter id="blur-medium" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="40"/>
  </filter>
  <filter id="blur-soft" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="20"/>
  </filter>
  <filter id="grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix values="0 0 0 0 0.95  0 0 0 0 0.93  0 0 0 0 0.85  0 0 0 0.4 0"/>
    <feComposite operator="in" in2="SourceGraphic"/>
  </filter>
  <linearGradient id="grad-warm" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e36c49"/>
    <stop offset="55%" stop-color="#e1b049"/>
    <stop offset="100%" stop-color="#e492a5"/>
  </linearGradient>
  <linearGradient id="grad-terra-mustard" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e36c49"/>
    <stop offset="100%" stop-color="#e1b049"/>
  </linearGradient>
  <linearGradient id="grad-pink-blue" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e492a5"/>
    <stop offset="100%" stop-color="#6b8bc7"/>
  </linearGradient>
  <linearGradient id="grad-rainbow-band" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e36c49" stop-opacity="0"/>
    <stop offset="15%" stop-color="#e36c49"/>
    <stop offset="40%" stop-color="#e1b049"/>
    <stop offset="65%" stop-color="#aac8b7"/>
    <stop offset="88%" stop-color="#6b8bc7"/>
    <stop offset="100%" stop-color="#6b8bc7" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="rg-terra" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e36c49" stop-opacity="1"/>
    <stop offset="55%" stop-color="#c24c2b" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#e36c49" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-mustard" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e1b049" stop-opacity="1"/>
    <stop offset="55%" stop-color="#ba892c" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#e1b049" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-sage" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#aac8b7" stop-opacity="1"/>
    <stop offset="55%" stop-color="#5a7770" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#aac8b7" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-blue" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#6b8bc7" stop-opacity="1"/>
    <stop offset="55%" stop-color="#3d5389" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#6b8bc7" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-pink" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e492a5" stop-opacity="1"/>
    <stop offset="55%" stop-color="#a4536a" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#e492a5" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-iris" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#6b8bc7"/>
    <stop offset="25%" stop-color="#3d5389"/>
    <stop offset="60%" stop-color="#e492a5"/>
    <stop offset="88%" stop-color="#e36c49"/>
    <stop offset="100%" stop-color="#0A0908" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg-iris-mask" cx="50%" cy="50%" r="50%">
    <stop offset="70%" stop-color="#0A0908" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0A0908" stop-opacity="1"/>
  </radialGradient>
  <radialGradient id="rg-vignette" cx="50%" cy="42%" r="70%">
    <stop offset="35%" stop-color="#0A0908" stop-opacity="0"/>
    <stop offset="78%" stop-color="#0A0908" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#0A0908" stop-opacity="0.88"/>
  </radialGradient>
</defs>

<!-- ============ CANVAS ============ -->
<rect id="canvas" width="1080" height="1350" fill="#0A0908"/>

<!-- ============ BACKGROUND BLURS ============ -->
<g id="background-blurs">
  <ellipse cx="540" cy="675" rx="450" ry="450" fill="url(#rg-sage)" filter="url(#blur-heavy)" opacity="0.35"/>
  <ellipse cx="1160" cy="120" rx="270" ry="270" fill="url(#rg-blue)" filter="url(#blur-heavy)" opacity="0.4"/>
  <ellipse cx="-10" cy="1230" rx="270" ry="270" fill="url(#rg-mustard)" filter="url(#blur-heavy)" opacity="0.35"/>
</g>


<!-- ============ FRAME ============ -->
<rect id="frame-inset" x="32" y="32" width="1016" height="1286" rx="8" ry="8"
      fill="none" stroke="rgba(237,230,216,0.06)" stroke-width="1"/>


<!-- ============ LOADER UI ============ -->
<g id="loader">
  <!-- Loading label -->
  <text x="80" y="380" fill="#d6cdb9"
        font-family="'IBM Plex Mono', monospace"
        font-weight="500" font-size="26" letter-spacing="6.2"
        style="text-transform:uppercase">Loading</text>
  <circle cx="256" cy="373" r="4" fill="#aac8b7" opacity="0.9"/>
  <circle cx="270" cy="373" r="4" fill="#aac8b7" opacity="0.6"/>
  <circle cx="284" cy="373" r="4" fill="#aac8b7" opacity="0.3"/>

  <!-- Big % number -->
  <text x="80" y="640" fill="#EDE6D8"
        font-family="Jost, 'Helvetica Neue', sans-serif"
        font-weight="900" font-size="240" letter-spacing="-9.6">
    <tspan fill="#aac8b7">85</tspan><tspan font-size="108" fill="#aac8b7"> %</tspan>
  </text>

  <!-- Bar track -->
  <rect x="80" y="720" width="920" height="12" rx="6" ry="6" fill="rgba(237,230,216,0.08)"/>
  <linearGradient id="grad-bar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#aac8b7"/>
    <stop offset="50%" stop-color="#5a7770"/>
    <stop offset="100%" stop-color="#aac8b7"/>
  </linearGradient>
  <rect x="80" y="720" width="782" height="12" rx="6" ry="6" fill="url(#grad-bar)"/>

  <!-- Status row -->
  <text x="80" y="770" fill="#8a857a"
        font-family="'IBM Plex Mono', monospace"
        font-weight="500" font-size="16" letter-spacing="2.6"
        style="text-transform:uppercase">system · refleksi_diri.exe</text>
  <text x="1000" y="770" text-anchor="end" fill="#8a857a"
        font-family="'IBM Plex Mono', monospace"
        font-weight="500" font-size="16" letter-spacing="2.6"
        style="text-transform:uppercase">please wait</text>
</g>

<!-- ============ HEADLINE ============ -->
<g id="typography-headline" font-family="Jost, 'Helvetica Neue', sans-serif"
   font-weight="800" letter-spacing="-1.4" font-size="68">
  <text x="80" y="960" fill="#EDE6D8" style="text-transform:uppercase">Loading itu</text>
  <text x="80" y="1028" fill="#aac8b7" font-style="italic" style="text-transform:uppercase">normal.</text>
</g>

<!-- ============ CAPTION ============ -->
<g id="caption" font-family="Jost, 'Helvetica Neue', sans-serif"
   font-style="italic" font-weight="300" font-size="24" fill="#d6cdb9">
  <text x="80" y="1175">Loading normal di teknologi.</text>
  <text x="80" y="1210">Kenapa kita tidak memberi ruang itu pada diri sendiri?</text>
</g>


<!-- ============ GRAIN ============ -->
<rect id="grain" width="1080" height="1350" fill="#EDE6D8" opacity="0.11" filter="url(#grain)"/>


<!-- ============ (corners intentionally empty) ============ -->

</svg>
